<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="google-site-verification"
      content="wESPQxR-tPtBKWeXCT8_6_7ArVSenvyWLSOmOG2qBfM"
    />
    <title>tidycsv — 브라우저 로컬 CSV·엑셀 데이터 정제·검증 도구</title>
    <meta
      name="description"
      content="tidycsv — 지저분한 CSV·엑셀을 브라우저에서 바로 검증·정제. 중복·포맷오류·이상치·정합성(합계·잔액·참조) 불일치를 잡아 리포트합니다. 데이터는 서버로 전송되지 않고, AI 없이 결정론적으로 동작합니다."
    />
    <meta
      name="keywords"
      content="tidycsv, CSV 정제, CSV 검증, 데이터 정합성, 중복 제거, 엑셀 정리, data cleaning, csv validator"
    />
    <link rel="canonical" href="https://duke-yoon.github.io/tidycsv/" />

    <!-- Open Graph (링크 공유 미리보기) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="tidycsv" />
    <meta property="og:title" content="tidycsv — 브라우저 로컬 CSV·엑셀 정제·검증 도구" />
    <meta
      property="og:description"
      content="지저분한 CSV·엑셀을 브라우저에서 바로 검증·정제. 중복·포맷·이상치·정합성 불일치를 잡아 리포트합니다. 데이터는 어디로도 전송되지 않아요."
    />
    <meta property="og:url" content="https://duke-yoon.github.io/tidycsv/" />
    <meta name="twitter:card" content="summary" />
  </head>
  <body>
    <header class="site-header">
      <h1>tidy<span>csv</span></h1>
      <p class="tagline">
        지저분한 CSV를 넣으면 <strong>중복·포맷오류·이상치·정합성 불일치</strong>를
        잡아 정리하고 리포트합니다.
      </p>
      <p class="privacy">
        🔒 올린 파일은 내 컴퓨터에서만 처리돼요 · AI 없이 · 언제 돌려도 같은 결과
      </p>
    </header>

    <main>
      <div id="dropzone" class="dropzone" role="button" tabindex="0">
        <div class="dz-inner">
          <div class="dz-icon">⬆</div>
          <div class="dz-text">
            CSV·엑셀(.xlsx) 파일을 끌어다 놓거나 <u>클릭해 선택</u>
          </div>
          <div class="dz-sub">또는</div>
          <button id="sample-btn" type="button" class="btn btn-ghost">
            예제 데이터 불러오기
          </button>
        </div>
        <input
          id="file-input"
          type="file"
          accept=".csv,text/csv,.xlsx,.xls,.xlsm,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
          hidden
        />
      </div>
      <p id="file-label" class="file-label"></p>

      <div id="rules" class="rules"></div>

      <div id="results" class="results"></div>

      <div id="clean-actions" class="clean-actions" hidden>
        <button id="clean-btn" type="button" class="btn btn-primary">
          🧹 자동 정제하기
        </button>
        <button id="download-btn" type="button" class="btn btn-download" hidden>
          ⬇ 정제된 CSV 다운로드
        </button>
      </div>

      <div id="clean-results" class="clean-results"></div>
    </main>

    <footer class="site-footer">
      <p>
        tidycsv · 오픈소스 데이터 정합성 도구 ·
        <a href="https://github.com/duke-yoon/tidycsv" rel="noopener"
          >GitHub</a
        >
      </p>
    </footer>

    <script type="module" src="/src/ui/main.ts"></script>
  </body>
</html>
